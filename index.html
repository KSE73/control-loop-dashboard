<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Control Loop 관리 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}
html,body,#root{height:100%;margin:0}
body{font-family:'Pretendard',system-ui,sans-serif;color:#2b2b35;background:#eceef1}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c6cad0;border-radius:6px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
.num{font-family:'Inter','Pretendard',sans-serif;font-feature-settings:"tnum";font-variant-numeric:tabular-nums}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs, writeBatch, doc, query, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmLEuMETZ1dHzo8IRT0yTLgrKx4znbNQA",
  authDomain: "pid-auto.firebaseapp.com",
  projectId: "pid-auto",
  storageBucket: "pid-auto.firebasestorage.app",
  messagingSenderId: "871900847238",
  appId: "1:871900847238:web:ee73252855f288ac96c507"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const fso = { collection, getDocs, writeBatch, doc, query, where };

const React = window.React;
const ReactDOM = window.ReactDOM;
const h = React.createElement;
const COLORS = ['#1890FF','#722ED1','#13C2C2'];

class DCLogic {
  constructor(props) {
    this.props = props || {};
    this.state = {};
    this.refs = {};
    this.__host = null;
  }
  setState(update, cb) { if (this.__host) this.__host.__setLogicState(update, cb); }
  forceUpdate() { if (this.__host) this.__host.forceUpdate(); }
  componentDidMount() {}
  componentWillUnmount() {}
  renderVals() { return {}; }
}

class Component extends DCLogic {
  state = {
    screen:'overview', team:'', proc:0, modal:null, expanded:{},
    changeType:'all', changeTeam:'all', changeProc:'all', year:2026,
    adminTab:'master', teamViewMode:'monthly', teamDailyMonth:'',
    masterUpload:null, masterDragOver:false, masterParseErr:'', masterSaving:false, masterUpTeam:0,
    dailyUpload:null, dailyDragOver:false, dailyParseErr:'', dailySaving:false, dailyUpTeam:0, dailySaveResult:null,
    loading:true, loadError:'', saving:false
  };

  constructor(props){
    super(props);
    this._charts = {};
    this.data = null;
  }

  // ===== Firestore =====
  async _loadData(){
    try {
      const snap = await fso.getDocs(fso.collection(db, 'loops'));
      const rawLoops = snap.docs.map(d => d.data());
      this.rawLoops = rawLoops;
      this.data = rawLoops.length ? this.computeFromLoops(rawLoops) : null;
      const expanded = {};
      const firstTeam = this.data?.teams[0];
      if (firstTeam) expanded[firstTeam.id] = true;
      this.setState({ loading:false, loadError:'', expanded,
        team: firstTeam?.id || '',
        screen: this.data ? 'overview' : 'admin' });
    } catch(e) {
      console.error('Firestore error:', e);
      this.setState({ loading:false, loadError: e.message });
    }
  }

  // ===== Master (기준정보) =====
  _extractMasterFromUpload(up){
    const list=[];
    up.sheets.forEach(sheet=>{
      const teamId=sheet.sheet.endsWith('팀')?sheet.sheet.slice(0,-1):sheet.sheet;
      sheet.procs.forEach(proc=>{
        proc.rows.forEach(row=>{
          if(!row.id) return;
          list.push({team:teamId, proc:proc.name==='미지정'?'':proc.name, tagId:row.id, tagName:row.name||row.id, dcs:row.dcs||''});
        });
      });
    });
    return list;
  }

  async _saveMaster(masterList){
    const teams=[...new Set(masterList.map(l=>l.team))];
    // Preserve existing dailyStatus keyed by tagId
    const dailyByTagId={};
    for(const team of teams){
      const snap=await fso.getDocs(fso.query(fso.collection(db,'loops'),fso.where('team','==',team)));
      snap.docs.forEach(d=>{ const dat=d.data(); dailyByTagId[dat.tagId]=dat.dailyStatus||{}; });
    }
    // Delete all existing docs for affected teams
    for(const team of teams){
      const snap=await fso.getDocs(fso.query(fso.collection(db,'loops'),fso.where('team','==',team)));
      for(let i=0;i<snap.docs.length;i+=499){
        const batch=fso.writeBatch(db);
        snap.docs.slice(i,i+499).forEach(d=>batch.delete(d.ref));
        await batch.commit();
      }
    }
    // Re-create with preserved dailyStatus
    for(let i=0;i<masterList.length;i+=499){
      const batch=fso.writeBatch(db);
      masterList.slice(i,i+499).forEach(loop=>{
        const ref=fso.doc(fso.collection(db,'loops'));
        batch.set(ref,{...loop, dailyStatus:dailyByTagId[loop.tagId]||{}, updatedAt:new Date().toISOString()});
      });
      await batch.commit();
    }
  }

  async _registerMaster(){
    const up=this.state.masterUpload;
    if(!up||this.state.masterSaving) return;
    this.setState({masterSaving:true, masterParseErr:''});
    try{
      const masterList=this._extractMasterFromUpload(up);
      if(!masterList.length){ this.setState({masterSaving:false, masterParseErr:'등록할 Tag가 없습니다.'}); return; }
      await this._saveMaster(masterList);
      this.setState({loading:true});
      await this._loadData();
      this.setState({masterSaving:false, masterUpload:null});
    }catch(e){
      this.setState({masterSaving:false, masterParseErr:'저장 오류: '+e.message});
    }
  }

  // ===== Daily (날짜별 데이터) =====
  _extractDailyFromUpload(up){
    const nd=d=>{ const s=String(d).trim(); const p=s.split(/[-\/]/); if(p.length<3) return s; if(p[0].length===4) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; if(p[2].length===4) return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; return s; };
    const list=[];
    up.sheets.forEach(sheet=>{
      sheet.procs.forEach(proc=>{
        proc.rows.forEach(row=>{
          if(!row.id) return;
          const dailyStatus={};
          (row.days||[]).forEach(d=>{ if(d.date&&d.status&&d.status!=='') dailyStatus[nd(d.date)]=d.status; });
          if(Object.keys(dailyStatus).length>0) list.push({tagId:row.id, dailyStatus});
        });
      });
    });
    return list;
  }

  async _saveDailyStatus(dailyList){
    const snap=await fso.getDocs(fso.collection(db,'loops'));
    const existingByTagId={};
    snap.docs.forEach(d=>{ const dat=d.data(); existingByTagId[dat.tagId]={ref:d.ref, dailyStatus:dat.dailyStatus||{}}; });
    const matched=dailyList.filter(u=>existingByTagId[u.tagId]);
    const unmatchedTags=dailyList.filter(u=>!existingByTagId[u.tagId]).map(u=>u.tagId);
    for(let i=0;i<matched.length;i+=499){
      const batch=fso.writeBatch(db);
      matched.slice(i,i+499).forEach(u=>{
        const ex=existingByTagId[u.tagId];
        batch.set(ex.ref,{dailyStatus:{...ex.dailyStatus,...u.dailyStatus}, updatedAt:new Date().toISOString()},{merge:true});
      });
      await batch.commit();
    }
    return {matchedCount:matched.length, unmatchedTags};
  }

  async _registerDaily(){
    const up=this.state.dailyUpload;
    if(!up||this.state.dailySaving) return;
    this.setState({dailySaving:true, dailyParseErr:'', dailySaveResult:null});
    try{
      const dailyList=this._extractDailyFromUpload(up);
      if(!dailyList.length){ this.setState({dailySaving:false, dailyParseErr:'업로드 파일에 날짜 데이터가 없습니다.'}); return; }
      const result=await this._saveDailyStatus(dailyList);
      this.setState({loading:true});
      await this._loadData();
      this.setState({dailySaving:false, dailyUpload:null, dailySaveResult:result});
    }catch(e){
      this.setState({dailySaving:false, dailyParseErr:'저장 오류: '+e.message});
    }
  }

  computeFromLoops(rawLoops){
    if (!rawLoops?.length) return null;
    // Normalize date keys to YYYY-MM-DD regardless of original separator (- or /)
    const normalizeDate=d=>{ const s=String(d).trim(); const p=s.split(/[-\/]/); if(p.length<3) return s; if(p[0].length===4) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; if(p[2].length===4) return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`; return s; };
    const allDatesSet = new Set();
    rawLoops.forEach(loop=>loop.dailyStatus && Object.keys(loop.dailyStatus).forEach(d=>allDatesSet.add(normalizeDate(d))));
    const sortedDates = [...allDatesSet].sort();
    if (!sortedDates.length) return null;

    const last90 = sortedDates.slice(-90);
    const last60 = sortedDates.slice(-60);
    const dailyLabels = last90.map(d=>{ const p=d.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}`; });

    const allMonths = [...new Set(sortedDates.map(d=>d.slice(0,7)))].sort();
    const useMonths = allMonths.slice(-12);
    const monthLabels = useMonths.map(m=>`${parseInt(m.split('-')[1])}월`);
    const curMonth = allMonths[allMonths.length-1];
    const prevMonth = allMonths.length>1 ? allMonths[allMonths.length-2] : null;
    const curMonthDates = sortedDates.filter(d=>d.startsWith(curMonth));
    const prevMonthDates = prevMonth ? sortedDates.filter(d=>d.startsWith(prevMonth)) : [];

    const calcRate=(ds,dates)=>{
      if (!dates.length||!ds) return 0;
      const filled=dates.filter(d=>ds[d]&&ds[d]!=='');
      if (!filled.length) return 0;
      return Math.round(filled.filter(d=>['AUT','RCAS'].includes(ds[d])).length/filled.length*1000)/10;
    };

    const teamMap={};
    rawLoops.forEach(loop=>{
      const tid=loop.team||'기타'; const pid=loop.proc||'공정1';
      if(!teamMap[tid]) teamMap[tid]={};
      if(!teamMap[tid][pid]) teamMap[tid][pid]=[];
      teamMap[tid][pid].push(loop);
    });
    const teamIds=Object.keys(teamMap).sort();

    const teams=teamIds.map(tid=>{
      const procIds=Object.keys(teamMap[tid]).sort();
      const processes=procIds.map(pid=>{
        const tags=teamMap[tid][pid];
        const processedTags=tags.map(loop=>{
          // Normalize keys in dailyStatus to YYYY-MM-DD for consistent lookup
          const rawDs=loop.dailyStatus||{};
          const ds=Object.fromEntries(Object.entries(rawDs).map(([k,v])=>[normalizeDate(k),v]));
          const heat=last60.map(d=>{ const s=ds[d]; if(!s||s==='') return 'NA'; return ['AUT','RCAS'].includes(s)?'AUT':'MAN'; });
          const rate=calcRate(ds,curMonthDates);
          const prev=calcRate(ds,prevMonthDates);
          const today=heat[heat.length-1]||'NA';
          return { id:loop.tagId||'—', name:loop.tagName||loop.tagId||'—', en:loop.tagName||'', dcs:loop.dcs||'', rate, prev, heat, today, manDays:heat.filter(c=>c==='MAN').length, code:today };
        });
        const total=processedTags.length;
        const autoLoop=processedTags.filter(t=>t.today==='AUT').length;
        const rate=total?Math.round(processedTags.reduce((a,t)=>a+t.rate,0)/total*10)/10:0;
        const prevRate=total?Math.round(processedTags.reduce((a,t)=>a+t.prev,0)/total*10)/10:0;
        return { name:pid, sub:'', total, autoLoop, rate, prevRate, tags:processedTags };
      });
      const total=processes.reduce((a,p)=>a+p.total,0);
      const al=processes.reduce((a,p)=>a+p.autoLoop,0);
      const auto=total?Math.round(processes.reduce((a,p)=>a+p.rate*p.total,0)/total*10)/10:0;
      const prev=total?Math.round(processes.reduce((a,p)=>a+p.prevRate*p.total,0)/total*10)/10:0;
      return { id:tid, name:tid+'팀', target:90, auto, prev, total, autoLoop:al, processes };
    });

    const teamMonthly={};
    teamIds.forEach(tid=>{
      teamMonthly[tid]=useMonths.map(month=>{
        const mDates=sortedDates.filter(d=>d.startsWith(month));
        if(!mDates.length) return 0;
        const allTags=Object.values(teamMap[tid]).flat();
        const rates=allTags.map(loop=>calcRate(Object.fromEntries(Object.entries(loop.dailyStatus||{}).map(([k,v])=>[normalizeDate(k),v])),mDates)).filter(r=>r>0);
        return rates.length?Math.round(rates.reduce((a,r)=>a+r,0)/rates.length*10)/10:0;
      });
    });
    const overallMonthly=useMonths.map((_,i)=>{
      const vals=teamIds.map(tid=>teamMonthly[tid][i]).filter(v=>v>0);
      return vals.length?Math.round(vals.reduce((a,v)=>a+v,0)/vals.length*10)/10:0;
    });

    const dailyTeam={};
    teamIds.forEach(tid=>{
      dailyTeam[tid]=Object.keys(teamMap[tid]).sort().map(pid=>{
        const tags=teamMap[tid][pid];
        return last90.map(date=>{
          const vals=tags.map(loop=>{
            const ds=Object.fromEntries(Object.entries(loop.dailyStatus||{}).map(([k,v])=>[normalizeDate(k),v]));
            const s=ds[date]; if(!s||s==='') return null; return ['AUT','RCAS'].includes(s)?100:0;
          }).filter(v=>v!==null);
          return vals.length?Math.round(vals.reduce((a,r)=>a+r,0)/vals.length*10)/10:null;
        });
      });
    });

    const changeEvents=[];
    if (prevMonth) {
      rawLoops.forEach(loop=>{
        const ds=Object.fromEntries(Object.entries(loop.dailyStatus||{}).map(([k,v])=>[normalizeDate(k),v]));
        const dominant=dates=>{ let a=0,m=0; dates.forEach(d=>{ const s=ds[d]; if(!s||s==='') return; ['AUT','RCAS'].includes(s)?a++:['MAN','0'].includes(s)?m++:null; }); return (a||m)?a>=m?'AUT':'MAN':null; };
        const prevMode=dominant(prevMonthDates), curMode=dominant(curMonthDates);
        if(prevMode&&curMode&&prevMode!==curMode){
          const type=prevMode==='AUT'&&curMode==='MAN'?'down':prevMode==='MAN'&&curMode==='AUT'?'up':null;
          if(type) changeEvents.push({ id:loop.tagId||'—', name:loop.tagName||'—', team:loop.team||'—', proc:loop.proc||'—', dcs:loop.dcs||'', prev:prevMode, cur:curMode, type });
        }
      });
    }

    const mNum = s => { const p=(s||'').split(/[-\/]/); const n=parseInt(p[1]); return isNaN(n)?'':n+'월'; };
    const curMonthLabel = mNum(curMonth);
    const prevMonthLabel = mNum(prevMonth);
    return { teams, target:90, teamMonthly, overallMonthly, dailyTeam, dailyDates:last90, dailyLabels, changeEvents, monthLabels, useMonths, teamIds, curMonthLabel, prevMonthLabel };
  }

  // ===== helpers =====
  T(){ return this.props.targetRate??90; }
  rateColor(v){ const t=this.T(); if(v>=t) return '#52C41A'; if(v>=t-6) return '#FAAD14'; return '#FF4D4D'; }
  statusColor(c){ return c==='MAN'?'#FF4D4D':(c==='NA'||c==='-')?'#c2c5cc':'#1890FF'; }
  statusLabel(c){ return ({AUT:'AUT',RCAS:'RCAS',MAN:'MAN','0':'MAN','-':'-',NA:'-'})[c]||c; }
  heatBg(c){ return c==='MAN'?'#FF4D4D':c==='NA'?'#d9d9d9':'#1890FF'; }
  dcsBg(d){ return d==='Honeywell'?'#fdecea':'#e8f3ff'; }
  dcsFg(d){ return d==='Honeywell'?'#E8390E':'#1677d6'; }
  delta(cur,prev){ const d=+(cur-prev).toFixed(1); return { d, txt:(d>=0?'+':'')+Math.abs(d)+'%p', color:d>=0?'#52C41A':'#FF4D4D', arrow:d>=0?'▲':'▼' }; }
  curTeam(){ if(!this.data) return null; return this.data.teams.find(t=>t.id===this.state.team)||this.data.teams[0]||null; }
  go(patch){ this.setState(patch); }

  // ===== charts =====
  componentDidMount(){ this._loadData(); }

  scheduleDraw(force){
    const sig=this.state.screen+'|'+this.state.team+'|'+this.state.year+'|'+this.state.changeType+'|'+this.T()+'|'+(this.state.teamViewMode||'monthly')+'|'+(this.state.teamDailyMonth||'');
    if(!force&&sig===this._sig) return;
    this._sig=sig;
    if(!window.echarts){ clearTimeout(this._t); this._t=setTimeout(()=>{ this._sig=null; this.scheduleDraw(true); },120); return; }
    requestAnimationFrame(()=>requestAnimationFrame(()=>this.renderCharts()));
  }

  renderCharts(){
    if(!window.echarts) return;
    Object.values(this._charts).forEach(c=>{ try{c.dispose();}catch(e){} });
    this._charts={};
    try{ this._draw(); }catch(e){ console.error('chart draw error',e); }
  }

  mount(id,opt){ const dom=document.getElementById(id); if(!dom) return; try{ const ex=echarts.getInstanceByDom(dom); if(ex)ex.dispose(); }catch(e){} const c=echarts.init(dom); c.setOption(opt); this._charts[id]=c; }

  _draw(){
    const D=this.data; if(!D) return;
    const T=this.T(), sc=this.state.screen;
    const grid='#eef0f3', red='#FF4D4D';
    if(sc==='overview'){
      const teams=[...D.teams].sort((a,b)=>a.auto-b.auto);
      this.mount('ovBar',{
        grid:{left:54,right:60,top:14,bottom:24},
        xAxis:{type:'value',max:100,min:70,axisLabel:{formatter:'{value}%',color:'#9a9da6'},splitLine:{lineStyle:{color:grid}}},
        yAxis:{type:'category',data:teams.map(t=>t.name),axisLabel:{color:'#3a3a47',fontWeight:600,fontSize:13},axisLine:{lineStyle:{color:grid}}},
        tooltip:{trigger:'axis',valueFormatter:v=>v+'%'},
        series:[{type:'bar',data:teams.map(t=>({value:t.auto,itemStyle:{color:t.auto>=T?'#52C41A':red,borderRadius:[0,4,4,0]}})),barWidth:22,
          markLine:{symbol:'none',data:[{xAxis:T}],lineStyle:{color:red,type:'dashed',width:1.5},label:{formatter:'목표 '+T+'%',color:red,fontSize:11,position:'insideEndTop'}},
          label:{show:true,position:'right',formatter:'{c}%',color:'#3a3a47',fontWeight:600,fontFamily:'Inter'}}]
      });
      this.mount('ovTrend',{
        grid:{left:46,right:24,top:22,bottom:28},
        legend:{right:0,top:0,itemWidth:18,itemHeight:3,textStyle:{fontSize:11,color:'#6b6e77'}},
        xAxis:{type:'category',data:D.monthLabels,axisLabel:{color:'#9a9da6'},axisLine:{lineStyle:{color:grid}}},
        yAxis:{type:'value',min:60,max:100,axisLabel:{formatter:'{value}%',color:'#9a9da6'},splitLine:{lineStyle:{color:grid}}},
        tooltip:{trigger:'axis',valueFormatter:v=>v+'%'},
        series:[
          {name:'전사 Auto율',type:'line',smooth:true,data:D.overallMonthly,lineStyle:{color:'#16161f',width:2.5},itemStyle:{color:'#16161f'},symbol:'circle',symbolSize:6,areaStyle:{color:'rgba(22,22,31,.05)'}},
          {name:'목표',type:'line',data:D.overallMonthly.map(()=>T),lineStyle:{color:red,type:'dashed',width:1.5},symbol:'none'}
        ]
      });
    }
    if(sc==='team'){
      const tm=this.curTeam(); if(!tm) return;
      const viewMode=this.state.teamViewMode||'monthly';
      const allDates=D.dailyDates||D.dailyLabels;
      let dates,procData;
      if(viewMode==='daily'){
        const months=D.useMonths||[];
        const selMonth=this.state.teamDailyMonth||(months.length?months[months.length-1]:'');
        const filtered=selMonth?allDates.map((d,i)=>({d,i})).filter(x=>x.d.startsWith(selMonth)):allDates.map((d,i)=>({d,i}));
        dates=filtered.map(x=>x.d);
        procData=(D.dailyTeam[tm.id]||[]).map(pd=>filtered.map(x=>pd[x.i]));
      }else{
        dates=allDates;
        procData=(D.dailyTeam[tm.id]||[]);
      }
      const isDailyMode=viewMode==='daily';
      const tickInterval=Math.max(1,Math.ceil(dates.length/10)-1);
      const fmtDate=val=>{ const p=String(val).split('-'); return p.length===3?`${parseInt(p[1])}/${parseInt(p[2])}`:val; };
      this.mount('tdLine',{
        grid:{left:46,right:24,top:26,bottom:isDailyMode?28:44},
        legend:{top:0,left:0,itemWidth:18,itemHeight:3,textStyle:{fontSize:11,color:'#6b6e77'}},
        xAxis:{type:'category',data:dates,
          axisLabel:{color:'#9a9da6',interval:tickInterval,formatter:fmtDate,rotate:dates.length>20?30:0},
          axisLine:{lineStyle:{color:grid}},
          axisTick:{alignWithLabel:true}},
        yAxis:{type:'value',min:0,max:100,axisLabel:{formatter:'{value}%',color:'#9a9da6'},splitLine:{lineStyle:{color:grid}}},
        tooltip:{trigger:'axis',formatter:params=>{
          const date=params[0]?.axisValue||'';
          const p=String(date).split('-');
          const dateStr=p.length===3?`${p[0]}년 ${parseInt(p[1])}월 ${parseInt(p[2])}일`:date;
          const lines=params.filter(x=>x.seriesName!=='목표'&&x.value!=null).map(x=>`${x.marker}${x.seriesName}: <b>${x.value}%</b>`);
          return `<div style="font-size:12px;line-height:1.6"><span style="font-weight:600;color:#3a3a47">${dateStr}</span><br>${lines.join('<br>')}</div>`;
        }},
        dataZoom:isDailyMode?[]:[{type:'inside'},{type:'slider',height:16,bottom:4}],
        series:tm.processes.map((p,i)=>({name:p.name,type:'line',smooth:true,symbol:isDailyMode?'circle':'none',symbolSize:5,data:procData[i]||[],lineStyle:{width:2,color:COLORS[i]||'#999'},itemStyle:{color:COLORS[i]||'#999'}}))
          .concat([{name:'목표',type:'line',data:dates.map(()=>T),lineStyle:{color:red,type:'dashed',width:1.5},symbol:'none'}])
      });
    }
    if(sc==='monthly'){
      this.mount('moLine',{
        grid:{left:46,right:24,top:30,bottom:28},

  get VALID_DCS(){ return ['Yokogawa','Honeywell']; }

  monthDates(){ const a=[]; const now=new Date(); const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0'); const days=new Date(y,now.getMonth()+1,0).getDate(); for(let d=1;d<=days;d++) a.push(y+'-'+m+'-'+String(d).padStart(2,'0')); return a; }

  downloadMasterTemplate(){
    const X=window.XLSX; if(!X) return;
    const wb=X.utils.book_new();
    const header=['공정','Tag ID','Tag Name','DCS'];
    const rows={'A팀':[['공정1','FIC-1001','Feed Flow','Yokogawa'],['공정1','TIC-1008','Temp Ctrl','Honeywell'],['공정2','PIC-2003','Press Ctrl','Yokogawa']],'B팀':[['공정1','FCV-5021','Flow Valve','Honeywell'],['공정2','TIC-2034','Temp Ctrl','Honeywell']],'C팀':[['공정1','LIC-4005','Level Ctrl','Honeywell'],['공정2','FIC-2210','Feed Flow','Yokogawa']]};
    Object.keys(rows).forEach(team=>{ const ws=X.utils.aoa_to_sheet([header].concat(rows[team])); ws['!cols']=[{wch:10},{wch:14},{wch:16},{wch:12}]; X.utils.book_append_sheet(wb,ws,team); });
    X.writeFile(wb,'ControlLoop_기준정보_양식.xlsx');
  }

  downloadDailyTemplate(){
    const X=window.XLSX; if(!X) return;
    const wb=X.utils.book_new();
    const dates=this.monthDates();
    const header=['Tag ID'].concat(dates);
    const series=(seed)=>dates.map((_,i)=>((i+seed)%7===4)?'MAN':((i+seed)%11===0?'RCAS':'AUT'));
    const rows={'A팀':[['FIC-1001'].concat(series(0)),['TIC-1008'].concat(series(2)),['PIC-2003'].concat(series(4))],'B팀':[['FCV-5021'].concat(series(5)),['TIC-2034'].concat(series(2))],'C팀':[['LIC-4005'].concat(series(1)),['FIC-2210'].concat(series(3))]};
    Object.keys(rows).forEach(team=>{ const ws=X.utils.aoa_to_sheet([header].concat(rows[team])); ws['!cols']=[{wch:14}].concat(dates.map(()=>({wch:11}))); X.utils.book_append_sheet(wb,ws,team); });
    X.writeFile(wb,'ControlLoop_날짜별데이터_양식.xlsx');
  }

  triggerPick(target){ const el=target==='daily'?this._dailyFileInput:this._masterFileInput; if(el) el.click(); }

  handleFiles(fileList, target){
    const file=fileList&&fileList[0]; if(!file) return;
    const tgt=target||'master';
    const X=window.XLSX; if(!X){ this.setState({[tgt+'ParseErr']:'엑셀 모듈 로딩 중입니다.',[tgt+'DragOver']:false}); return; }
    const rdr=new FileReader();
    rdr.onload=(e)=>{
      try{
        const wb=X.read(e.target.result,{type:'array'});
        const FIXED=new Set(['공정','Process','공정명','Tag ID','TagID','Tag','태그','Tag Name','TagName','이름','태그명','DCS','비고','Note','__EMPTY']);
        const sheets=wb.SheetNames.map(nm=>{
          const json=X.utils.sheet_to_json(wb.Sheets[nm],{defval:''});
          const procMap={}; let valid=0, invalid=0;
          json.forEach((r,idx)=>{
            const g=(keys)=>{ for(const k of keys){ if(r[k]!==undefined&&r[k]!=='') return String(r[k]).trim(); } return ''; };
            const proc=g(['공정','Process','공정명']), id=g(['Tag ID','TagID','Tag','태그']), name=g(['Tag Name','TagName','이름','태그명']), dcs=g(['DCS']);
            const dateKeys=Object.keys(r).filter(k=>!FIXED.has(String(k).trim()));
            const days=dateKeys.map(k=>{ const s=String(r[k]).trim(); return {date:String(k).trim(),status:s,ok:s===''||this.VALID_STATUS.includes(s)}; });
            const filled=days.filter(d=>d.status!=='');
            const autoDays=filled.filter(d=>['AUT','RCAS'].includes(d.status)).length;
            const autoRate=filled.length?Math.round(autoDays/filled.length*1000)/10:0;
            const badDays=days.filter(d=>!d.ok).length;
            const errs=[];
            if(tgt==='master'&&dcs&&!this.VALID_DCS.includes(dcs)) errs.push('DCS');
            if(tgt==='daily'&&badDays) errs.push('상태값 오류('+badDays+'일)');
            if(!id) errs.push('Tag ID 없음');
            const ok=errs.length===0; ok?valid++:invalid++;
            const pk=proc||'미지정';
            (procMap[pk]=procMap[pk]||[]).push({row:idx+2,id,name,dcs,days,filled:filled.length,autoDays,autoRate,badDays,ok,errs});
          });
          return { sheet:nm, total:json.length, valid, invalid, procs:Object.keys(procMap).sort().map(k=>({name:k,rows:procMap[k]})) };
        });
        const sum=(f)=>sheets.reduce((a,s)=>a+f(s),0);
        this.setState({[tgt+'Upload']:{fileName:file.name,sheetCount:wb.SheetNames.length,sheetNames:wb.SheetNames,sheets,totalRows:sum(s=>s.total),totalValid:sum(s=>s.valid),totalInvalid:sum(s=>s.invalid)},[tgt+'UpTeam']:0,[tgt+'ParseErr']:'',[tgt+'DragOver']:false});
      }catch(err){ this.setState({[tgt+'ParseErr']:'파일을 읽는 중 오류가 발생했습니다: '+err.message,[tgt+'DragOver']:false}); }
    };
    rdr.readAsArrayBuffer(file);
  }

    const sideChildren=[
      h('div',{key:'ml',style:{padding:'0 16px 8px',fontSize:'10.5px',fontWeight:700,color:'#9a9da6',letterSpacing:'.4px'}},'메뉴'),
      navIt('overview','전사 Overview',ovIcon),
      h('div',{key:'tl',style:{padding:'13px 16px 5px',fontSize:'10.5px',fontWeight:700,color:'#9a9da6',letterSpacing:'.4px'}},'팀별 현황'),
      ...teamItems,
      h('div',{key:'div',style:{height:'1px',background:'#e3e5ea',margin:'12px 16px'}}),
      navIt('monthly','월별 요약',moIcon),
      navIt('change','변동 분석',chIcon),
      navIt('admin','관리자 설정',adIcon),
      h('div',{key:'sp',style:{flex:1}}),
      h('div',{key:'ts',style:{padding:'12px 18px',fontSize:'10.5px',color:'#a7aab2',lineHeight:1.5}},'데이터 기준일',h('br'),h('span',{className:'num',style:{color:'#7c7f88',fontWeight:600}},dateStr)),
    ];
    const sidebar=h('aside',{style:{flex:'none',width:'236px',background:'#f4f5f7',borderRight:'1px solid #e3e5ea',display:'flex',flexDirection:'column',overflowY:'auto',padding:'14px 0'}},
      ...sideChildren);

    const crumbEls=crumbs.reduce((acc,c,i)=>{ acc.push(h('span',{key:'l'+i,style:{color:c.color,fontWeight:c.weight}},c.label)); if(c.sep) acc.push(h('span',{key:'s'+i,style:{color:'#c7cad0'}},c.sep)); return acc; },[]);
    const bannerEl=banner.show?h('div',{style:{display:'flex',alignItems:'center',gap:'11px',background:banner.bg,border:'1px solid '+banner.bd,borderLeft:'4px solid '+banner.accent,borderRadius:'8px',padding:'12px 16px',marginBottom:'18px'}},
      h('span',{style:{fontSize:'15px'}},banner.icon),
      h('span',{style:{fontSize:'13px',color:banner.fg,fontWeight:500}},banner.text)):null;

    const main=h('main',{style:{flex:1,minWidth:0,overflowY:'auto',background:'#eceef1',padding:0}},
      h('div',{style:{maxWidth:'1640px',margin:'0 auto',padding:'22px 30px 48px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'7px',fontSize:'12px',color:'#8b8e97',marginBottom:'14px'}},crumbEls),
        bannerEl,
        h('div',{ref:vals.screenRef},screenView)));

    let modalEl=null;
    if(modal.open){
      modalEl=h('div',{onClick:modal.onClose,style:{position:'fixed',inset:0,background:'rgba(16,16,24,.45)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center'}},
        h('div',{onClick:modal.stop,style:{width:'760px',maxHeight:'84vh',overflowY:'auto',background:'#fff',borderRadius:'12px',boxShadow:'0 24px 60px rgba(0,0,0,.3)'}},
          h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'20px 24px',borderBottom:'1px solid #eef0f3'}},
            h('div',null,
              h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
                h('span',{className:'num',style:{fontSize:'19px',fontWeight:700,color:'#16161f'}},modal.id),
                modal.dcs?h('span',{style:{fontSize:'11px',fontWeight:600,padding:'3px 9px',borderRadius:'5px',background:modal.dcsBg,color:modal.dcsFg}},modal.dcs):null,
                h('span',{style:{fontSize:'11px',fontWeight:600,padding:'3px 9px',borderRadius:'5px',background:modal.stBg,color:modal.stFg}},'현재 '+modal.statusCode)),
              h('div',{style:{fontSize:'13px',color:'#6b6e77',marginTop:'5px'}},modal.name+(modal.path?' · '+modal.path:''))),
            h('div',{onClick:modal.onClose,style:{cursor:'pointer',width:'30px',height:'30px',borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center',color:'#9a9da6',fontSize:'18px'}},'✕')),
          h('div',{style:{padding:'20px 24px'}},
            h('div',{style:{display:'flex',gap:'14px',marginBottom:'20px'}},
              h('div',{style:{flex:1,background:'#f7f8fa',borderRadius:'8px',padding:'13px 15px'}},h('div',{style:{fontSize:'11px',color:'#8b8e97',marginBottom:'4px'}},'당월 Auto율'),h('div',{className:'num',style:{fontSize:'26px',fontWeight:700,color:modal.rateColor}},modal.rate,h('span',{style:{fontSize:'15px'}},'%'))),
              h('div',{style:{flex:1,background:'#f7f8fa',borderRadius:'8px',padding:'13px 15px'}},h('div',{style:{fontSize:'11px',color:'#8b8e97',marginBottom:'4px'}},'전월 대비'),h('div',{className:'num',style:{fontSize:'26px',fontWeight:700,color:modal.deltaColor}},modal.deltaArrow+' '+modal.deltaTxt)),
              h('div',{style:{flex:1,background:'#f7f8fa',borderRadius:'8px',padding:'13px 15px'}},h('div',{style:{fontSize:'11px',color:'#8b8e97',marginBottom:'4px'}},'MAN 전환 (당월)'),h('div',{className:'num',style:{fontSize:'26px',fontWeight:700,color:'#16161f'}},modal.manDays,h('span',{style:{fontSize:'14px',color:'#8b8e97'}},'일')))),
            h('div',{style:{fontSize:'13px',fontWeight:600,color:'#3a3a47',marginBottom:'10px'}},'최근 60일 상태 이력 히트맵'),
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(30,1fr)',gap:'4px',marginBottom:'8px'}},
              modal.heat.map((hv,hi)=>h('div',{key:hi,title:hv.title,style:{aspectRatio:'1',borderRadius:'3px',background:hv.bg}}))),
            h('div',{style:{display:'flex',gap:'16px',fontSize:'11px',color:'#8b8e97',marginBottom:'22px'}},
              h('span',{style:{display:'flex',alignItems:'center',gap:'5px'}},h('span',{style:{width:'10px',height:'10px',borderRadius:'2px',background:'#1890FF'}}),'AUT'),
              h('span',{style:{display:'flex',alignItems:'center',gap:'5px'}},h('span',{style:{width:'10px',height:'10px',borderRadius:'2px',background:'#FF4D4D'}}),'MAN'),
              h('span',{style:{display:'flex',alignItems:'center',gap:'5px'}},h('span',{style:{width:'10px',height:'10px',borderRadius:'2px',background:'#d9d9d9'}}),'데이터 없음')),
            h('div',{style:{fontSize:'13px',fontWeight:600,color:'#3a3a47',marginBottom:'8px'}},'운전 코멘트'),
            h('textarea',{placeholder:'상태 변동 사유 또는 조치 내용을 입력하세요',style:{width:'100%',height:'74px',border:'1px solid #dfe1e6',borderRadius:'8px',padding:'10px 12px',fontSize:'13px',fontFamily:'inherit',resize:'none',color:'#2b2b35',outline:'none'}}),
            h('div',{style:{display:'flex',justifyContent:'flex-end',gap:'9px',marginTop:'12px'}},
              h('button',{onClick:modal.onClose,style:{border:'1px solid #dfe1e6',background:'#fff',color:'#5b5e67',padding:'9px 18px',borderRadius:'7px',fontSize:'13px',fontWeight:600,cursor:'pointer',fontFamily:'inherit'}},'취소'),
              h('button',{style:{border:'none',background:'#16161f',color:'#fff',padding:'9px 20px',borderRadius:'7px',fontSize:'13px',fontWeight:600,cursor:'pointer',fontFamily:'inherit'}},'코멘트 저장')))));
    }

    return h('div',{style:{display:'flex',flexDirection:'column',height:'100vh',minWidth:'1280px',overflow:'hidden',background:'#eceef1'}},
      gnb,
      h('div',{style:{display:'flex',flex:1,minHeight:0}},sidebar,main),
      modalEl);
  }
}

class App extends React.Component {
  constructor(props){
    super(props);
    this._logic=new Component({accent:'#E8390E',targetRate:90});
    this._logic.__host=this;
    this.state={_v:0};
  }
  __setLogicState(update,cb){
    const prev=this._logic.state;
    const patch=typeof update==='function'?update(prev):update;
    this._logic.state=Object.assign({},prev,patch);
    this.setState(s=>({_v:s._v+1}),cb);
  }
  componentDidMount(){ this._logic.componentDidMount(); }
  render(){ return this._logic.renderLayout(); }
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
